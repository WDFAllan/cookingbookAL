# Base H2 en mémoire — isolée, créée et détruite à chaque run de test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crée le schéma depuis les entités — pas besoin des migrations Flyway
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway désactivé : ses scripts SQL utilisent une syntaxe PostgreSQL incompatible avec H2
spring.flyway.enabled=false

# Spring Security désactivé pour les tests d'intégration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.SecurityFilterAutoConfiguration

# JWT stub pour les tests
app.jwt.secret=Y29va2luZ2Jvb2tTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjUhISE=
app.jwt.expiration=604800000
