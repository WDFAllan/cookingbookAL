spring.application.name=cookingbookAL

# Database — override via env vars en production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cookingbookDB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Upload
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=${JWT_SECRET:Y29va2luZ2Jvb2tTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjUhISE=}
app.jwt.expiration=${JWT_EXPIRATION:604800000}

# CORS — origines autorisées (séparées par des virgules)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
