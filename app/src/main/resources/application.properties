spring.application.name=cookingbookAL
spring.datasource.url=jdbc:postgresql://localhost:5432/cookingbookDB
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT — secret base64 (min 32 octets décodés), expiration 7 jours
app.jwt.secret=Y29va2luZ2Jvb2tTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjUhISE=
app.jwt.expiration=604800000
